{% extends 'base.html' %}
{% load static %}

{% block title %}{{ titulo }} - MOI{% endblock %}

{% block content %}
<div class="construction-section">
    <div class="construction-content">
        <h1>🚧 {{ titulo }}</h1>
        <p>{{ mensaje }}</p>
        <div class="construction-icon">
            <span>🔧</span>
        </div>
        <a href="{% url 'inicio' %}" class="btn-action">Volver al Inicio</a>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.construction-section {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60vh;
    text-align: center;
}

.construction-content h1 {
    color: #F5D627;
    font-size: 2.5em;
    margin-bottom: 20px;
}

.construction-content p {
    font-size: 1.2em;
    margin-bottom: 30px;
    color: #ccc;
}

.construction-icon {
    font-size: 4em;
    margin: 30px 0;
}

.construction-icon span {
    display: inline-block;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
    }
    40% {
        transform: translateY(-10px);
    }
    60% {
        transform: translateY(-5px);
    }
}
</style>
{% endblock %}
