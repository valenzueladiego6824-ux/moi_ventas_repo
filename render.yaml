services:
  - type: web
    name: dep_ventas
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn proyecto.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moi_ventas
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False

databases:
  - name: moi_ventas
